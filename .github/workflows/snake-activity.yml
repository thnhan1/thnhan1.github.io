# Replace this with your actual workflow name (e.g., "Update Contribution Snake")
name: Update Contribution Snake

on:
  # Replace this with your preferred trigger
  push:
    branches:
      - main  # Or your default branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate contribution snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.thnhan1 }} # Use github.actor for the currently logged-in user 
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
